<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RushRetake Auth</title>

<style>
    body {
        margin: 0;
        padding: 0;
        background: #0b0b0b;
        color: #ffffff;
        font-family: "Inter", Arial, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        text-align: center;
        overflow: hidden;
    }

    #msg {
        font-size: 26px;
        font-weight: 500;
        opacity: 0;
        transform: translateY(10px);
        animation: fadeIn 0.6s ease forwards;
        max-width: 90%;
        line-height: 1.4;
    }

    @keyframes fadeIn {
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .confetti {
        position: fixed;
        width: 8px;
        height: 8px;
        background: #fff;
        top: -10px;
        border-radius: 2px;
        opacity: 0.9;
        animation: fall linear forwards;
    }

    @keyframes fall {
        to {
            transform: translateY(110vh) rotate(360deg);
            opacity: 0;
        }
    }
</style>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>

<div id="msg">⏳ Connecting your account...</div>

<script>
const tg = window.Telegram.WebApp;
tg.ready();

function setMessage(text) {
    document.getElementById("msg").innerText = text;
}

function spawnConfetti() {
    for (let i = 0; i < 25; i++) {
        const c = document.createElement("div");
        c.className = "confetti";

        c.style.left = Math.random() * 100 + "vw";
        c.style.background = ["#ff3b3b", "#ffd93b", "#3bff62", "#3bb4ff", "#ff3bf7"][Math.floor(Math.random()*5)];
        c.style.animationDuration = (1.5 + Math.random() * 1.5) + "s";
        c.style.transform = "rotate(" + (Math.random()*360) + "deg)";

        document.body.appendChild(c);

        setTimeout(() => c.remove(), 3000);
    }
}

const data = tg.initDataUnsafe;

if (!data || !data.user) {
    setMessage("⚠️ Please open this WebApp through Telegram.");
} else {

    const payload = {
        user: {
            user: data.user,
            auth_date: data.auth_date
        }
    };

    fetch("https://telegram-auth-70lq.onrender.com/auth", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
    })
    .then(async res => {
        const raw = await res.text();
        console.log("RAW RESPONSE:", raw);

        let json;
        try {
            json = JSON.parse(raw);
        } catch (e) {
            setMessage("❌ Server error.");
            return;
        }

        if (json.ok) {
            setMessage("🎉 Done! Your login code was sent to Telegram.");
            spawnConfetti();
        } else {
            setMessage("❌ Registration failed.");
        }
    })
    .catch(err => {
        setMessage("❌ Server error.");
    });
}
</script>

</body>
</html>
