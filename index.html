<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RushRetake Auth</title>

<style>
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600&display=swap');

    body {
        margin: 0;
        padding: 0;
        height: 100vh;
        width: 100vw;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;

        /* Градиент как на сайте */
        background: linear-gradient(
            to bottom,
            #1e3c72 0%,     /* яркий голубой сверху */
            #1a2f4d 40%,    /* мягкий переход */
            #0b0b0b 100%    /* глубокий тёмный низ */
        );

        font-family: "Inter", sans-serif;
        color: #fff;
        position: relative;
    }

    /* Мягкое голубое свечение */
    .glow {
        position: absolute;
        width: 900px;
        height: 900px;
        background: radial-gradient(circle, rgba(0,140,255,0.35), transparent 70%);
        top: -200px;
        left: 50%;
        transform: translateX(-50%);
        filter: blur(120px);
        z-index: 0;
        pointer-events: none;
    }

    /* Лого */
    #logo {
        width: 150px;
        height: auto;
        margin-bottom: 25px;
        opacity: 0;
        animation: fadeIn 0.8s ease forwards;
        z-index: 10;
    }

    /* Текст */
    #msg {
        font-size: 36px;
        font-family: "Bebas Neue", sans-serif;
        letter-spacing: 1px;
        opacity: 0;
        transform: translateY(10px);
        animation: fadeIn 0.8s ease forwards;
        max-width: 90%;
        line-height: 1.1;
        z-index: 10;
        text-shadow: 0 0 18px rgba(0, 150, 255, 0.25);
    }

    @keyframes fadeIn {
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    /* Лоадер */
    .loader {
        margin: 20px auto 0;
        width: 50px;
        height: 50px;
        border: 4px solid rgba(255,255,255,0.2);
        border-top-color: #00aaff;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        z-index: 10;
    }

    @keyframes spin {
        to { transform: rotate(360deg); }
    }

    /* Конфетти */
    #confetti-container {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        overflow: hidden;
        z-index: 999;
    }
</style>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>

<div class="glow"></div>

<img id="logo" src="logo.png" alt="Logo">

<div id="msg">⏳ Connecting your account...</div>
<div class="loader"></div>

<div id="confetti-container"></div>

<script>
const tg = window.Telegram.WebApp;
tg.ready();

function setMessage(text) {
    document.getElementById("msg").innerText = text;
}

/* Конфетти */
function spawnConfettiExplosion() {
    const container = document.getElementById("confetti-container");
    const colors = ["#3bb4ff", "#00aaff", "#66d9ff", "#99e6ff", "#ccefff"];

    const particles = 80;

    for (let i = 0; i < particles; i++) {
        const div = document.createElement("div");
        div.style.position = "absolute";
        div.style.width = "10px";
        div.style.height = "10px";
        div.style.background = colors[Math.floor(Math.random() * colors.length)];
        div.style.borderRadius = "3px";
        div.style.left = "50%";
        div.style.top = "50%";
        div.style.transform = "translate(-50%, -50%)";
        div.style.willChange = "transform, opacity";

        container.appendChild(div);

        const angle = Math.random() * Math.PI * 2;
        const speed = 5 + Math.random() * 7;
        const gravity = 0.18;

        let vx = Math.cos(angle) * speed;
        let vy = Math.sin(angle) * speed;

        let x = 0;
        let y = 0;
        let opacity = 1;

        function animate() {
            x += vx;
            y += vy;
            vy += gravity;
            opacity -= 0.015;

            div.style.transform = `translate(${x}px, ${y}px) rotate(${y * 6}deg)`;
            div.style.opacity = opacity;

            if (opacity > 0) {
                requestAnimationFrame(animate);
            } else {
                div.remove();
            }
        }

        requestAnimationFrame(animate);
    }
}

const data = tg.initDataUnsafe;

if (!data || !data.user) {
    setMessage("⚠️ Please open this WebApp through Telegram.");
} else {

    const payload = {
        user: {
            user: data.user,
            auth_date: data.auth_date
        }
    };

    fetch("https://telegram-auth-70lq.onrender.com/auth", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
    })
    .then(async res => {
        const raw = await res.text();
        console.log("RAW RESPONSE:", raw);

        let json;
        try {
            json = JSON.parse(raw);
        } catch (e) {
            setMessage("❌ Server error.");
            return;
        }

        if (json.ok) {
            setMessage("🎉 Done! Your login code was sent to Telegram.");
            document.querySelector(".loader").style.display = "none";
            spawnConfettiExplosion();
        } else {
            setMessage("❌ Registration failed.");
            document.querySelector(".loader").style.display = "none";
        }
    })
    .catch(err => {
        setMessage("❌ Server error.");
        document.querySelector(".loader").style.display = "none";
    });
}
</script>

</body>
</html>
