<!DOCTYPE html>
<html>
<body>
<script>
const tg = window.Telegram.WebApp;
tg.ready();

// Получаем данные Telegram
const data = tg.initDataUnsafe;

// Передаём их в Unity через deep link
const json = encodeURIComponent(JSON.stringify(data));
window.location.href = "unity://" + json;
</script>
</body>
</html>
