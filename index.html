<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>RushRetake Auth</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
  :root{
    --bg-top:#0d2a3d;
    --bg-mid:#0d1722;
    --bg-bottom:#07090d;
    --panel:rgba(255,255,255,0.07);
    --panel-border:rgba(255,255,255,0.12);
    --text:#ffffff;
    --muted:rgba(255,255,255,0.72);
    --accent:#19b4ff;
    --accent-2:#64d7ff;
    --danger:#ff5f73;
    --success:#67f0a7;
    --shadow:0 20px 60px rgba(0,0,0,0.45);
  }

  *{box-sizing:border-box}
  html,body{margin:0;padding:0;height:100%}

  body{
    background:
      radial-gradient(circle at 20% 15%, rgba(0,165,255,.22), transparent 28%),
      radial-gradient(circle at 80% 20%, rgba(0,120,255,.14), transparent 24%),
      radial-gradient(circle at 50% 100%, rgba(0,0,0,.45), transparent 35%),
      linear-gradient(180deg,var(--bg-top) 0%,var(--bg-mid) 45%,var(--bg-bottom) 100%);
    color:var(--text);
    font-family:"Inter", Arial, sans-serif;
    overflow:hidden;
  }

  .bg-grid{
    position:fixed;
    inset:0;
    background-image:
      linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size:42px 42px;
    pointer-events:none;
  }

  .glow{
    position:fixed;
    width:min(90vw,720px);
    height:min(90vw,720px);
    left:50%;
    top:-28vmin;
    transform:translateX(-50%);
    background:radial-gradient(circle, rgba(31,178,255,0.28), rgba(31,178,255,0.12) 30%, transparent 70%);
    filter:blur(90px);
    pointer-events:none;
  }

  .page{
    min-height:100vh;
    min-height:100dvh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:
      max(16px, env(safe-area-inset-top))
      16px
      max(16px, env(safe-area-inset-bottom))
      16px;
    position:relative;
    z-index:2;
  }

  .card{
    width:min(100%, 460px);
    max-height:min(92vh, 760px);
    max-height:min(92dvh, 760px);
    border:1px solid var(--panel-border);
    background:linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.04));
    backdrop-filter:blur(18px);
    -webkit-backdrop-filter:blur(18px);
    border-radius:24px;
    padding:28px 22px 20px;
    box-shadow:var(--shadow);
    position:relative;
    overflow:hidden;
    display:flex;
    flex-direction:column;
    justify-content:center;
  }

  .card::before{
    content:"";
    position:absolute;
    inset:0;
    background:linear-gradient(135deg, rgba(255,255,255,.08), transparent 45%);
    pointer-events:none;
  }

  .top-line{
    position:absolute;
    top:0; left:0; right:0;
    height:3px;
    background:linear-gradient(90deg, transparent, var(--accent), var(--accent-2), transparent);
    opacity:.95;
  }

  .lang-screen,
  .auth-screen{
    position:relative;
    z-index:2;
  }

  .hidden{display:none !important;}

  .brand{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:10px;
    margin-bottom:16px;
  }

  #logo,#logo2{
    width:clamp(72px, 16vw, 104px);
    height:auto;
    display:block;
  }

  .title{
    margin:0;
    font-family:"Bebas Neue", sans-serif;
    font-size:clamp(28px, 6vw, 40px);
    letter-spacing:1px;
    line-height:1;
    text-align:center;
  }

  .subtitle{
    margin:0;
    color:var(--muted);
    font-size:clamp(12px, 3.2vw, 14px);
    line-height:1.4;
    text-align:center;
    max-width:320px;
  }

  .lang-buttons{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    margin-top:18px;
  }

  .btn{
    border:none;
    border-radius:14px;
    padding:12px 14px;
    font-size:14px;
    font-weight:600;
    font-family:"Inter", Arial, sans-serif;
    cursor:pointer;
  }

  .btn-primary{
    background:linear-gradient(180deg, #27c0ff 0%, #099ce4 100%);
    color:white;
  }

  .btn-secondary{
    background:rgba(255,255,255,.08);
    color:#fff;
    border:1px solid rgba(255,255,255,.1);
  }

  .status-wrap{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:14px;
    padding-top:2px;
  }

  #msg{
    margin:0;
    font-family:"Bebas Neue", sans-serif;
    font-size:clamp(24px, 5.6vw, 34px);
    line-height:1.08;
    letter-spacing:1px;
    text-align:center;
    max-width:100%;
    text-wrap:balance;
  }

  #submsg{
    margin:0;
    color:var(--muted);
    font-size:clamp(12px, 3.2vw, 14px);
    line-height:1.45;
    text-align:center;
    min-height:36px;
    max-width:320px;
  }

  .loader{
    width:clamp(40px, 10vw, 52px);
    height:clamp(40px, 10vw, 52px);
    border-radius:50%;
    border:4px solid rgba(255,255,255,.14);
    border-top-color:var(--accent);
    border-right-color:var(--accent-2);
    animation:spin 0.9s linear infinite;
  }

  .lang-switch{
    margin-top:14px;
    display:flex;
    justify-content:center;
    gap:8px;
    flex-wrap:wrap;
  }

  .mini-btn{
    border:1px solid rgba(255,255,255,.12);
    background:rgba(255,255,255,.06);
    color:#fff;
    border-radius:12px;
    padding:8px 12px;
    font-size:12px;
    cursor:pointer;
  }

  .mini-btn.active{
    background:rgba(25,180,255,.18);
    border-color:rgba(25,180,255,.45);
  }

  .success{color:var(--success)}
  .error{color:var(--danger)}

  #confetti-container{
    position:fixed;
    inset:0;
    pointer-events:none;
    overflow:hidden;
    z-index:99;
  }

  @keyframes spin{
    to{transform:rotate(360deg);}
  }

  @media (max-width: 420px){
    .card{
      border-radius:20px;
      padding:22px 16px 16px;
    }

    .lang-buttons{
      grid-template-columns:1fr;
    }
  }

  @media (max-height: 700px){
    .card{
      padding:18px 16px 14px;
      max-height:96dvh;
    }

    .brand{
      margin-bottom:12px;
      gap:8px;
    }

    .status-wrap{
      gap:10px;
    }

    .lang-switch{
      margin-top:10px;
    }
  }
</style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="glow"></div>

  <div class="page">
    <div class="card">
      <div class="top-line"></div>

      <div id="langScreen" class="lang-screen">
        <div class="brand">
          <img id="logo" src="logo.png" alt="Logo">
          <h1 class="title">RushRetake</h1>
          <p id="langTitle" class="subtitle">Choose your language to continue</p>
        </div>

        <div class="lang-buttons">
          <button id="langSelectEn" type="button" class="btn btn-primary">English</button>
          <button id="langSelectRu" type="button" class="btn btn-secondary">Русский</button>
        </div>
      </div>

      <div id="authScreen" class="auth-screen hidden">
        <div class="brand">
          <img id="logo2" src="logo.png" alt="Logo">
          <h1 class="title">RushRetake</h1>
        </div>

        <div class="status-wrap">
          <p id="msg">Connecting your account...</p>
          <p id="submsg"></p>
          <div id="loader" class="loader"></div>
        </div>

        <div class="lang-switch">
          <button id="langEnBtn" type="button" class="mini-btn">EN</button>
          <button id="langRuBtn" type="button" class="mini-btn">RU</button>
        </div>
      </div>
    </div>
  </div>

  <div id="confetti-container"></div>

<script>
const tg = window.Telegram && window.Telegram.WebApp ? window.Telegram.WebApp : null;
if (tg) {
  try {
    tg.ready();
    tg.expand();
  } catch (_) {}
}

const i18n = {
  en: {
    chooseLanguage: "Choose your language to continue",
    connecting: "Connecting your account...",
    connectingSub: "Please wait while we verify your Telegram session.",
    openInTelegram: "Please open this page through Telegram.",
    openInTelegramSub: "This authorization only works inside Telegram WebApp.",
    serverError: "Server error.",
    serverErrorSub: "Something went wrong while contacting the auth server.",
    done: "Done! Your login code was sent to Telegram.",
    doneSub: "Return to the game and continue sign in.",
    registrationFailed: "Registration failed.",
    rateLimit: "Too many attempts. Please wait."
  },
  ru: {
    chooseLanguage: "Выберите язык для продолжения",
    connecting: "Подключаем ваш аккаунт...",
    connectingSub: "Подождите, идёт проверка Telegram-сессии.",
    openInTelegram: "Откройте эту страницу через Telegram.",
    openInTelegramSub: "Авторизация работает только внутри Telegram WebApp.",
    serverError: "Ошибка сервера.",
    serverErrorSub: "Не удалось связаться с сервером авторизации.",
    done: "Готово! Код входа отправлен в Telegram.",
    doneSub: "Вернитесь в игру и продолжите вход.",
    registrationFailed: "Не удалось завершить регистрацию.",
    rateLimit: "Слишком много попыток. Подождите."
  }
};

let currentLang = "";
let authStarted = false;

function t(key){
  return (i18n[currentLang] || i18n.en)[key] || key;
}

function setMessage(text, sub = "", type = ""){
  const msg = document.getElementById("msg");
  const submsg = document.getElementById("submsg");
  if (!msg || !submsg) return;
  msg.innerText = text;
  submsg.innerText = sub;
  msg.classList.remove("success", "error");
  if(type) msg.classList.add(type);
}

function hideLoader(){
  const l = document.getElementById("loader");
  if(l) l.style.display = "none";
}

function showLoader(){
  const l = document.getElementById("loader");
  if(l) l.style.display = "block";
}

function updateLanguageButtons(){
  const enBtn = document.getElementById("langEnBtn");
  const ruBtn = document.getElementById("langRuBtn");
  if (enBtn) enBtn.classList.toggle("active", currentLang === "en");
  if (ruBtn) ruBtn.classList.toggle("active", currentLang === "ru");
}

function renderTexts(){
  const langTitle = document.getElementById("langTitle");
  if (langTitle) langTitle.innerText = t("chooseLanguage");
  updateLanguageButtons();
}

function showAuthScreen(){
  const langScreen = document.getElementById("langScreen");
  const authScreen = document.getElementById("authScreen");
  if (langScreen) langScreen.classList.add("hidden");
  if (authScreen) authScreen.classList.remove("hidden");
}

function selectLanguage(lang){
  currentLang = lang;
  renderTexts();
  showAuthScreen();
  startAuthFlow();
}

function changeLanguage(lang){
  currentLang = lang;
  renderTexts();
}

function spawnConfettiExplosion(){
  const container = document.getElementById("confetti-container");
  if (!container) return;
  const colors = ["#3bb4ff","#00aaff","#66d9ff","#99e6ff","#ccefff","#67f0a7"];
  for(let i = 0; i < 70; i++){
    const d = document.createElement("div");
    d.style.cssText = `
      position:absolute;
      width:${6 + Math.random() * 8}px;
      height:${6 + Math.random() * 8}px;
      border-radius:${Math.random() > 0.5 ? "50%" : "3px"};
      left:50%;
      top:50%;
      opacity:1;
    `;
    d.style.background = colors[Math.floor(Math.random() * colors.length)];
    container.appendChild(d);

    const angle = Math.random() * Math.PI * 2;
    const speed = 4 + Math.random() * 8;
    const gravity = 0.18;
    let vx = Math.cos(angle) * speed;
    let vy = Math.sin(angle) * speed - 2;
    let x = 0, y = 0, opacity = 1;

    (function anim(){
      x += vx;
      y += vy;
      vy += gravity;
      opacity -= 0.014;
      d.style.transform = `translate(${x}px, ${y}px) rotate(${y * 5}deg)`;
      d.style.opacity = opacity;
      if(opacity > 0) requestAnimationFrame(anim);
      else d.remove();
    })();
  }
}

async function startAuthFlow(){
  if(authStarted) return;
  authStarted = true;

  setMessage(t("connecting"), t("connectingSub"));
  showLoader();

  const initData = tg ? (tg.initData || "") : "";
  if (!initData){
    setMessage(t("openInTelegram"), t("openInTelegramSub"), "error");
    hideLoader();
    authStarted = false;
    return;
  }

  try {
    const res = await fetch("https://telegram-auth-70lq.onrender.com/auth", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ initData })
    });

    const raw = await res.text();
    let json = null;

    try {
      json = JSON.parse(raw);
    } catch {
      setMessage(t("serverError"), t("serverErrorSub"), "error");
      hideLoader();
      authStarted = false;
      return;
    }

    if (res.status === 429) {
      setMessage("❌ " + (json?.message || t("rateLimit")), t("serverErrorSub"), "error");
      hideLoader();
      authStarted = false;
      return;
    }

    if (!json.ok) {
      setMessage("❌ " + (json.message || json.error || t("registrationFailed")), t("serverErrorSub"), "error");
      hideLoader();
      authStarted = false;
      return;
    }

    setMessage("✓ " + t("done"), t("doneSub"), "success");
    hideLoader();
    spawnConfettiExplosion();
  } catch {
    setMessage(t("serverError"), t("serverErrorSub"), "error");
    hideLoader();
    authStarted = false;
  }
}

function bindEvents(){
  const langSelectEn = document.getElementById("langSelectEn");
  const langSelectRu = document.getElementById("langSelectRu");
  const langEnBtn = document.getElementById("langEnBtn");
  const langRuBtn = document.getElementById("langRuBtn");

  if (langSelectEn) langSelectEn.addEventListener("click", () => selectLanguage("en"));
  if (langSelectRu) langSelectRu.addEventListener("click", () => selectLanguage("ru"));
  if (langEnBtn) langEnBtn.addEventListener("click", () => changeLanguage("en"));
  if (langRuBtn) langRuBtn.addEventListener("click", () => changeLanguage("ru"));
}

function init(){
  bindEvents();
  currentLang = "en";
  renderTexts();
}

if (document.readyState === "loading") {
  document.addEventListener("DOMContentLoaded", init, { once: true });
} else {
  init();
}
</script>
</body>
</html>
