<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RushRetake Auth</title>

<style>
    body {
        margin: 0;
        padding: 0;
        background: #0b0b0b;
        color: #ffffff;
        font-family: "Inter", Arial, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        text-align: center;
        overflow: hidden;
    }

    #msg {
        font-size: 26px;
        font-weight: 500;
        opacity: 0;
        transform: translateY(10px);
        animation: fadeIn 0.6s ease forwards;
        max-width: 90%;
        line-height: 1.4;
    }

    @keyframes fadeIn {
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
</style>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>

<div id="msg">⏳ Connecting your account...</div>

<script>
const tg = window.Telegram.WebApp;
tg.ready();

const data = tg.initDataUnsafe;

function setMessage(text) {
    document.getElementById("msg").innerText = text;
}

if (!data || !data.user) {
    setMessage("⚠️ Please open this WebApp through Telegram.");
} else {

    const payload = {
        user: {
            user: data.user,
            auth_date: data.auth_date
        }
    };

    fetch("https://telegram-auth-70lq.onrender.com/auth", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
    })
    .then(async res => {
        const raw = await res.text();
        console.log("RAW RESPONSE:", raw);

        let json;
        try {
            json = JSON.parse(raw);
        } catch (e) {
            setMessage("❌ Server error.");
            return;
        }

        if (json.ok) {
            setMessage("✅ Done! Your login code was sent to Telegram.");
        } else {
            setMessage("❌ Registration failed.");
        }
    })
    .catch(err => {
        setMessage("❌ Server error.");
    });
}
</script>

</body>
</html>
