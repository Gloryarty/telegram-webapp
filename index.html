<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RushRetake Auth</title>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600&display=swap');
    body {
        margin: 0; padding: 0;
        background: linear-gradient(to bottom, #0f2b3f 0%, #0d1f2c 40%, #0b0b0b 100%);
        color: #fff; font-family: "Inter", Arial, sans-serif;
        display: flex; flex-direction: column; justify-content: center; align-items: center;
        height: 100vh; text-align: center; overflow: hidden; position: relative;
    }
    .glow { position:absolute; width:600px; height:600px;
        background: radial-gradient(circle, rgba(0,150,255,0.28), transparent 70%);
        top:-150px; left:50%; transform:translateX(-50%); filter:blur(90px); z-index:0; pointer-events:none;}
    #logo { width:140px; height:auto; margin-bottom:25px; animation:fadeIn .8s ease forwards; opacity:0; z-index:10;}
    #msg { font-size:32px; font-family:"Bebas Neue", sans-serif; letter-spacing:1px;
        opacity:0; transform:translateY(10px); animation:fadeIn .8s ease forwards;
        max-width:90%; line-height:1.2; z-index:10; text-shadow:0 0 12px rgba(255,255,255,0.15); }
    @keyframes fadeIn { to { opacity:1; transform:translateY(0);} }
    .loader { margin:20px auto 0; width:48px; height:48px; border:4px solid rgba(255,255,255,0.2);
        border-top-color:#00aaff; border-radius:50%; animation:spin 1s linear infinite; z-index:10;}
    @keyframes spin { to { transform:rotate(360deg);} }
    #confetti-container { position:fixed; top:0; left:0; width:100%; height:100%;
        pointer-events:none; overflow:hidden; z-index:999;}
</style>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>

<div class="glow"></div>
<img id="logo" src="logo.png" alt="Logo">
<div id="msg">⏳ Connecting your account...</div>
<div class="loader"></div>
<div id="confetti-container"></div>

<script>
const tg = window.Telegram.WebApp;
tg.ready();

function setMessage(text) { document.getElementById("msg").innerText = text; }
function hideLoader() { const l=document.querySelector(".loader"); if(l) l.style.display="none"; }

function spawnConfettiExplosion() {
    const container = document.getElementById("confetti-container");
    const colors = ["#3bb4ff","#00aaff","#66d9ff","#99e6ff","#ccefff"];
    const particles = 80;
    for (let i = 0; i < particles; i++) {
        const d = document.createElement("div");
        d.style.cssText="position:absolute;width:10px;height:10px;border-radius:3px;left:50%;top:50%;will-change:transform,opacity;";
        d.style.background = colors[Math.floor(Math.random()*colors.length)];
        container.appendChild(d);
        const angle=Math.random()*Math.PI*2, speed=5+Math.random()*7, gravity=0.18;
        let vx=Math.cos(angle)*speed, vy=Math.sin(angle)*speed, x=0,y=0,opacity=1;
        (function anim(){
            x+=vx; y+=vy; vy+=gravity; opacity-=0.015;
            d.style.transform=`translate(${x}px,${y}px) rotate(${y*6}deg)`; d.style.opacity=opacity;
            if(opacity>0) requestAnimationFrame(anim); else d.remove();
        })();
    }
}

function sendAuth(){
    const initData = tg.initData || tg.initDataUnsafe || "";
    if (!initData) {
        setMessage("⚠️ Please open this WebApp through Telegram.");
        hideLoader();
        return;
    }

    fetch("https://telegram-auth-70lq.onrender.com/auth", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ initData })
    })
    .then(async res => {
        const raw = await res.text();
        let json;
        try { json = JSON.parse(raw); } catch (e) {
            setMessage("❌ Server error.");
            hideLoader();
            return;
        }

        if (res.status === 429 && json?.message) {
            setMessage("❌ " + json.message);
            hideLoader();
            return;
        }
        if (!json.ok) {
            setMessage("❌ " + (json.message || json.error || "Registration failed."));
            hideLoader();
            return;
        }

        setMessage("🎉 Done! Your login code was sent to Telegram.");
        hideLoader();
        spawnConfettiExplosion();
    })
    .catch(err => {
        setMessage("❌ Server error");
        hideLoader();
    });
}

sendAuth();
</script>

</body>
</html>
