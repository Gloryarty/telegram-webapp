<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>RushRetake Auth</title>
<style>
body {
    background: #0d0d0d;
    color: #ffffff;
    font-family: Arial, sans-serif;
    text-align: center;
    padding-top: 40vh;
    font-size: 24px;
}
</style>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>

<div id="msg">Привязываем аккаунт...</div>

<script>
const tg = window.Telegram.WebApp;
tg.ready();

const data = tg.initDataUnsafe;

if (!data || !data.user) {
    document.getElementById("msg").innerText = "Откройте WebApp через Telegram.";
} else {

    const payload = {
        user: {
            user: data.user,
            auth_date: data.auth_date
        }
    };

    fetch("https://telegram-auth-70lq.onrender.com/auth", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
    })
    .then(async res => {
        const raw = await res.text();
        console.log("RAW RESPONSE:", raw);

        let json;
        try {
            json = JSON.parse(raw);
        } catch (e) {
            document.getElementById("msg").innerText = "Ошибка сервера.";
            return;
        }

        if (json.ok) {
            document.getElementById("msg").innerText = "Готово! Код отправлен в Telegram.";
        } else {
            document.getElementById("msg").innerText = "Ошибка регистрации.";
        }
    })
    .catch(err => {
        document.getElementById("msg").innerText = "Ошибка сервера.";
    });
}
</script>

</body>
</html>
