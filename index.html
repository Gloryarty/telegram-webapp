<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RushRetake Auth</title>
<!-- стили опущу для краткости, можно оставить как у тебя -->
<script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
<div id="msg">⏳ Connecting your account...</div>
<div class="loader"></div>
<script>
const tg = window.Telegram.WebApp;
tg.ready();
function setMessage(t){ document.getElementById("msg").innerText = t; }
function hideLoader(){ const l=document.querySelector(".loader"); if(l) l.style.display="none"; }
fetch("https://telegram-auth-70lq.onrender.com/auth", {
  method:"POST",
  headers: { "Content-Type":"application/json" },
  body: JSON.stringify({ initData: tg.initData || "" })
})
.then(async res => {
  const raw = await res.text();
  let json; try { json = JSON.parse(raw); } catch { setMessage("❌ Server error."); hideLoader(); return; }
  if (res.status === 429 && json?.message) { setMessage("❌ " + json.message); hideLoader(); return; }
  if (res.status === 401 && json?.error) { setMessage("❌ " + json.error); hideLoader(); return; }
  if (json.ok) { setMessage("🎉 Done! Your login code was sent to Telegram."); hideLoader(); }
  else { setMessage("❌ " + (json.message || json.error || "Registration failed.")); hideLoader(); }
})
.catch(()=>{ setMessage("❌ Server error."); hideLoader(); });
</script>
</body>
</html>
