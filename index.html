<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>RushRetake Auth</title>
<style>
    body {
        background: #0d0d0d;
        color: #ffffff;
        font-family: Arial, sans-serif;
        text-align: center;
        padding-top: 40vh;
        font-size: 24px;
    }
</style>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>

<div id="msg">Привязываем аккаунт...</div>

<script>
const tg = window.Telegram.WebApp;
tg.ready();

const data = tg.initDataUnsafe;

if (!data || Object.keys(data).length === 0) {
    document.getElementById("msg").innerText =
        "Откройте WebApp через Telegram.";
} else {
    fetch("https://telegram-auth-70lq.onrender.com/auth", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ user: data })
    })
    .then(res => res.json())
    .then(res => {
        document.getElementById("msg").innerText =
            "Готово! Теперь вернитесь в игру.";
    })
    .catch(err => {
        document.getElementById("msg").innerText =
            "Ошибка сервера.";
    });
}
</script>

</body>
</html>
