<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RushRetake Auth</title>

<style>
    body {
        margin: 0;
        padding: 0;
        background: #0b0b0b;
        color: #ffffff;
        font-family: "Inter", Arial, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        text-align: center;
        overflow: hidden;
        position: relative;
    }

    #msg {
        font-size: 26px;
        font-weight: 500;
        opacity: 0;
        transform: translateY(10px);
        animation: fadeIn 0.6s ease forwards;
        max-width: 90%;
        line-height: 1.4;
        z-index: 10;
    }

    @keyframes fadeIn {
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .confetti {
        position: absolute;
        border-radius: 3px;
        opacity: 0.9;
        pointer-events: none;
    }

    @keyframes explode {
        to {
            transform: translate(var(--dx), var(--dy)) rotate(720deg);
            opacity: 0;
        }
    }
</style>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>

<div id="msg">⏳ Connecting your account...</div>

<script>
const tg = window.Telegram.WebApp;
tg.ready();

function setMessage(text) {
    document.getElementById("msg").innerText = text;
}

function spawnConfettiExplosion() {
    const colors = ["#ff3b3b", "#ffd93b", "#3bff62", "#3bb4ff", "#ff3bf7"];

    for (let i = 0; i < 45; i++) {
        const c = document.createElement("div");
        c.className = "confetti";

        const size = 6 + Math.random() * 8;
        c.style.width = size + "px";
        c.style.height = size + "px";
        c.style.background = colors[Math.floor(Math.random() * colors.length)];

        const angle = Math.random() * 2 * Math.PI;
        const distance = 80 + Math.random() * 120;

        const dx = Math.cos(angle) * distance + "px";
        const dy = Math.sin(angle) * distance + "px";

        c.style.setProperty("--dx", dx);
        c.style.setProperty("--dy", dy);

        c.style.left = "50%";
        c.style.top = "50%";
        c.style.transform = "translate(-50%, -50%)";

        c.style.animation = `explode ${0.8 + Math.random() * 1.4}s ease-out forwards`;

        document.body.appendChild(c);

        setTimeout(() => c.remove(), 2500);
    }
}

const data = tg.initDataUnsafe;

if (!data || !data.user) {
    setMessage("⚠️ Please open this WebApp through Telegram.");
} else {

    const payload = {
        user: {
            user: data.user,
            auth_date: data.auth_date
        }
    };

    fetch("https://telegram-auth-70lq.onrender.com/auth", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
    })
    .then(async res => {
        const raw = await res.text();
        console.log("RAW RESPONSE:", raw);

        let json;
        try {
            json = JSON.parse(raw);
        } catch (e) {
            setMessage("❌ Server error.");
            return;
        }

        if (json.ok) {
            setMessage("🎉 Done! Your login code was sent to Telegram.");
            spawnConfettiExplosion();
        } else {
            setMessage("❌ Registration failed.");
        }
    })
    .catch(err => {
        setMessage("❌ Server error.");
    });
}
</script>

</body>
