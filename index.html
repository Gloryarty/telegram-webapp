<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>RushRetake Auth</title>
<style>
    body {
        background: #0d0d0d;
        color: #ffffff;
        font-family: Arial, sans-serif;
        text-align: center;
        padding-top: 40vh;
        font-size: 24px;
    }
</style>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>

<div id="msg">Вы успешно привязали Telegram к RushRetake!</div>

<script>
const tg = window.Telegram.WebApp;

if (!tg || !tg.initDataUnsafe || Object.keys(tg.initDataUnsafe).length === 0) {
    document.getElementById("msg").innerText =
        "Откройте WebApp через Telegram, а не через браузер.";
} else {
    tg.ready();
    const json = encodeURIComponent(JSON.stringify(tg.initDataUnsafe));
    setTimeout(() => {
        window.location.href = "unity://" + json;
    }, 1500);
}
</script>

</body>
</html>
