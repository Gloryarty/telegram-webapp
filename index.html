<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>RushRetake Auth</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Oswald:wght@500;600;700&display=swap" rel="stylesheet">
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
  :root{
    --bg-0:#0d1015;
    --bg-1:#12171e;
    --bg-2:#1b212b;
    --panel:#181d25;
    --panel-2:#212835;
    --line:rgba(255,255,255,0.08);
    --line-strong:rgba(255,255,255,0.14);
    --text:#f5f7fb;
    --muted:#98a3b5;
    --accent:#f2b54a;
    --accent-2:#ffd17a;
    --success:#84f2a0;
    --danger:#ff6b78;
    --shadow:0 22px 80px rgba(0,0,0,0.5);
  }

  *{box-sizing:border-box}
  html,body{margin:0;padding:0;height:100%}

  body{
    background:
      radial-gradient(circle at top center, rgba(242,181,74,0.08), transparent 26%),
      linear-gradient(180deg, #161b23 0%, #10141b 42%, #0b0e13 100%);
    color:var(--text);
    font-family:"Inter", Arial, sans-serif;
    overflow:hidden;
  }

  .noise,
  .grid{
    position:fixed;
    inset:0;
    pointer-events:none;
  }

  .grid{
    background-image:
      linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
    background-size:32px 32px;
    mask-image:linear-gradient(180deg, rgba(255,255,255,0.55), transparent 85%);
  }

  .noise{
    opacity:.08;
    background-image:
      radial-gradient(rgba(255,255,255,0.7) 0.6px, transparent 0.7px);
    background-size:7px 7px;
  }

  .page{
    min-height:100vh;
    min-height:100dvh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:
      max(18px, env(safe-area-inset-top))
      18px
      max(18px, env(safe-area-inset-bottom))
      18px;
    position:relative;
    z-index:2;
  }

  .frame{
    width:min(100%, 480px);
    border:1px solid var(--line-strong);
    background:linear-gradient(180deg, rgba(28,34,44,.96), rgba(18,22,29,.98));
    border-radius:0;
    box-shadow:var(--shadow);
    overflow:hidden;
    position:relative;
  }

  .frame::before{
    content:"";
    position:absolute;
    inset:0;
    border:1px solid rgba(255,255,255,0.03);
    pointer-events:none;
  }

  .topbar{
    height:6px;
    background:linear-gradient(90deg, #7d5d22 0%, var(--accent) 50%, #7d5d22 100%);
  }

  .content{
    padding:22px 20px 18px;
  }

  .hidden{display:none !important;}

  .brand{
    display:flex;
    align-items:center;
    gap:14px;
    margin-bottom:20px;
  }

  .logo-wrap{
    width:64px;
    height:64px;
    flex:0 0 64px;
    border:1px solid var(--line-strong);
    background:linear-gradient(180deg, #202734, #151a22);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:8px;
  }

  #logo,#logo2{
    max-width:100%;
    max-height:100%;
    display:block;
  }

  .brand-copy{
    min-width:0;
    flex:1;
  }

  .eyebrow{
    margin:0 0 4px 0;
    color:var(--accent);
    font-size:11px;
    font-weight:700;
    letter-spacing:.18em;
    text-transform:uppercase;
  }

  .title{
    margin:0;
    font-family:"Oswald", sans-serif;
    font-size:34px;
    line-height:1;
    letter-spacing:.03em;
    text-transform:uppercase;
  }

  .subtitle{
    margin:10px 0 0 0;
    color:var(--muted);
    font-size:13px;
    line-height:1.45;
  }

  .section{
    border:1px solid var(--line);
    background:linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.015));
  }

  .section-head{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    padding:12px 14px;
    border-bottom:1px solid var(--line);
    background:rgba(255,255,255,.025);
  }

  .section-title{
    margin:0;
    font-family:"Oswald", sans-serif;
    font-size:20px;
    line-height:1;
    text-transform:uppercase;
    letter-spacing:.04em;
  }

  .section-tag{
    color:var(--muted);
    font-size:11px;
    font-weight:700;
    letter-spacing:.16em;
    text-transform:uppercase;
  }

  .lang-buttons{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
    padding:14px;
  }

  .btn{
    appearance:none;
    border:1px solid var(--line-strong);
    border-radius:0;
    min-height:52px;
    padding:12px 14px;
    font-family:"Oswald", sans-serif;
    font-size:20px;
    letter-spacing:.03em;
    text-transform:uppercase;
    cursor:pointer;
    transition:transform .12s ease, border-color .12s ease, background .12s ease;
  }

  .btn:active{
    transform:translateY(1px);
  }

  .btn-primary{
    background:linear-gradient(180deg, var(--accent-2), var(--accent));
    color:#17130b;
    border-color:#c69339;
  }

  .btn-secondary{
    background:linear-gradient(180deg, #273140, #1a2029);
    color:var(--text);
  }

  .auth-screen .section{
    padding:18px 16px;
  }

  .status-wrap{
    display:flex;
    flex-direction:column;
    align-items:flex-start;
    gap:12px;
  }

  #msg{
    margin:0;
    font-family:"Oswald", sans-serif;
    font-size:28px;
    line-height:1.02;
    text-transform:uppercase;
    letter-spacing:.03em;
  }

  #submsg{
    margin:0;
    color:var(--muted);
    font-size:13px;
    line-height:1.45;
    min-height:38px;
  }

  .loader-row{
    display:flex;
    align-items:center;
    gap:12px;
    width:100%;
  }

  .loader{
    width:28px;
    height:28px;
    border:3px solid rgba(255,255,255,.12);
    border-top-color:var(--accent);
    border-radius:50%;
    animation:spin .85s linear infinite;
    flex:0 0 auto;
  }

  .loader-bar{
    height:6px;
    flex:1;
    background:rgba(255,255,255,.08);
    overflow:hidden;
    position:relative;
  }

  .loader-bar::before{
    content:"";
    position:absolute;
    inset:0;
    width:42%;
    background:linear-gradient(90deg, transparent, var(--accent), transparent);
    animation:scan 1.2s linear infinite;
  }

  .lang-switch{
    margin-top:14px;
    display:flex;
    gap:8px;
    flex-wrap:wrap;
  }

  .mini-btn{
    appearance:none;
    border:1px solid var(--line-strong);
    background:#1f2530;
    color:var(--text);
    border-radius:0;
    min-width:58px;
    min-height:40px;
    padding:8px 12px;
    font-size:12px;
    font-weight:800;
    letter-spacing:.12em;
    text-transform:uppercase;
    cursor:pointer;
  }

  .mini-btn.active{
    color:#17130b;
    background:linear-gradient(180deg, var(--accent-2), var(--accent));
    border-color:#c69339;
  }

  .success{color:var(--success)}
  .error{color:var(--danger)}

  #confetti-container{
    position:fixed;
    inset:0;
    pointer-events:none;
    overflow:hidden;
    z-index:99;
  }

  @keyframes spin{
    to{transform:rotate(360deg);}
  }

  @keyframes scan{
    0%{transform:translateX(-120%)}
    100%{transform:translateX(320%)}
  }

  @media (max-width: 420px){
    .content{
      padding:18px 14px 14px;
    }

    .brand{
      gap:12px;
      margin-bottom:16px;
    }

    .logo-wrap{
      width:56px;
      height:56px;
      flex-basis:56px;
    }

    .title{
      font-size:29px;
    }

    .lang-buttons{
      grid-template-columns:1fr;
    }

    #msg{
      font-size:24px;
    }
  }
</style>
</head>
<body>
  <div class="grid"></div>
  <div class="noise"></div>

  <div class="page">
    <div class="frame">
      <div class="topbar"></div>
      <div class="content">

        <div id="langScreen" class="lang-screen">
          <div class="brand">
            <div class="logo-wrap">
              <img id="logo" src="logo.png" alt="Logo">
            </div>
            <div class="brand-copy">
              <p class="eyebrow">Telegram Auth</p>
              <h1 class="title">RushRetake</h1>
              <p id="langTitle" class="subtitle">Choose your language to continue</p>
            </div>
          </div>

          <div class="section">
            <div class="section-head">
              <h2 class="section-title">Language</h2>
              <span class="section-tag">Select</span>
            </div>
            <div class="lang-buttons">
              <button id="langSelectEn" type="button" class="btn btn-primary">English</button>
              <button id="langSelectRu" type="button" class="btn btn-secondary">Русский</button>
            </div>
          </div>
        </div>

        <div id="authScreen" class="auth-screen hidden">
          <div class="brand">
            <div class="logo-wrap">
              <img id="logo2" src="logo.png" alt="Logo">
            </div>
            <div class="brand-copy">
              <p class="eyebrow">Telegram Auth</p>
              <h1 class="title">RushRetake</h1>
            </div>
          </div>

          <div class="section">
            <div class="status-wrap">
              <p id="msg">Connecting your account...</p>
              <p id="submsg"></p>
              <div class="loader-row">
                <div id="loader" class="loader"></div>
                <div class="loader-bar"></div>
              </div>
            </div>
          </div>

          <div class="lang-switch">
            <button id="langEnBtn" type="button" class="mini-btn">EN</button>
            <button id="langRuBtn" type="button" class="mini-btn">RU</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="confetti-container"></div>

<script>
const tg = window.Telegram && window.Telegram.WebApp ? window.Telegram.WebApp : null;
if (tg) {
  try {
    tg.ready();
    tg.expand();
  } catch (_) {}
}

const i18n = {
  en: {
    chooseLanguage: "Choose your language to continue",
    connecting: "Connecting your account...",
    connectingSub: "Please wait while we verify your Telegram session.",
    openInTelegram: "Please open this page through Telegram.",
    openInTelegramSub: "This authorization only works inside Telegram WebApp.",
    serverError: "Server error.",
    serverErrorSub: "Something went wrong while contacting the auth server.",
    done: "Done! Your login code was sent to Telegram.",
    doneSub: "Return to the game and continue sign in.",
    registrationFailed: "Registration failed.",
    rateLimit: "Too many attempts. Please wait."
  },
  ru: {
    chooseLanguage: "Выберите язык для продолжения",
    connecting: "Подключаем ваш аккаунт...",
    connectingSub: "Подождите, идёт проверка Telegram-сессии.",
    openInTelegram: "Откройте эту страницу через Telegram.",
    openInTelegramSub: "Авторизация работает только внутри Telegram WebApp.",
    serverError: "Ошибка сервера.",
    serverErrorSub: "Не удалось связаться с сервером авторизации.",
    done: "Готово! Код входа отправлен в Telegram.",
    doneSub: "Вернитесь в игру и продолжите вход.",
    registrationFailed: "Не удалось завершить регистрацию.",
    rateLimit: "Слишком много попыток. Подождите."
  }
};

let currentLang = "";
let authStarted = false;

function t(key){
  return (i18n[currentLang] || i18n.en)[key] || key;
}

function setMessage(text, sub = "", type = ""){
  const msg = document.getElementById("msg");
  const submsg = document.getElementById("submsg");
  if (!msg || !submsg) return;
  msg.innerText = text;
  submsg.innerText = sub;
  msg.classList.remove("success", "error");
  if(type) msg.classList.add(type);
}

function hideLoader(){
  const l = document.getElementById("loader");
  if(l) l.style.display = "none";
}

function showLoader(){
  const l = document.getElementById("loader");
  if(l) l.style.display = "block";
}

function updateLanguageButtons(){
  const enBtn = document.getElementById("langEnBtn");
  const ruBtn = document.getElementById("langRuBtn");
  if (enBtn) enBtn.classList.toggle("active", currentLang === "en");
  if (ruBtn) ruBtn.classList.toggle("active", currentLang === "ru");
}

function renderTexts(){
  const langTitle = document.getElementById("langTitle");
  if (langTitle) langTitle.innerText = t("chooseLanguage");
  updateLanguageButtons();
}

function showAuthScreen(){
  const langScreen = document.getElementById("langScreen");
  const authScreen = document.getElementById("authScreen");
  if (langScreen) langScreen.classList.add("hidden");
  if (authScreen) authScreen.classList.remove("hidden");
}

function selectLanguage(lang){
  currentLang = lang;
  renderTexts();
  showAuthScreen();
  startAuthFlow();
}

function changeLanguage(lang){
  currentLang = lang;
  renderTexts();
}

function spawnConfettiExplosion(){
  const container = document.getElementById("confetti-container");
  if (!container) return;
  const colors = ["#f2b54a","#ffd17a","#ffffff","#84f2a0"];
  for(let i = 0; i < 64; i++){
    const d = document.createElement("div");
    d.style.cssText = `
      position:absolute;
      width:${5 + Math.random() * 7}px;
      height:${5 + Math.random() * 7}px;
      border-radius:${Math.random() > 0.55 ? "50%" : "2px"};
      left:50%;
      top:50%;
      opacity:1;
    `;
    d.style.background = colors[Math.floor(Math.random() * colors.length)];
    container.appendChild(d);

    const angle = Math.random() * Math.PI * 2;
    const speed = 4 + Math.random() * 8;
    const gravity = 0.18;
    let vx = Math.cos(angle) * speed;
    let vy = Math.sin(angle) * speed - 2;
    let x = 0, y = 0, opacity = 1;

    (function anim(){
      x += vx;
      y += vy;
      vy += gravity;
      opacity -= 0.014;
      d.style.transform = `translate(${x}px, ${y}px) rotate(${y * 5}deg)`;
      d.style.opacity = opacity;
      if(opacity > 0) requestAnimationFrame(anim);
      else d.remove();
    })();
  }
}

async function startAuthFlow(){
  if(authStarted) return;
  authStarted = true;

  setMessage(t("connecting"), t("connectingSub"));
  showLoader();

  const initData = tg ? (tg.initData || "") : "";
  if (!initData){
    setMessage(t("openInTelegram"), t("openInTelegramSub"), "error");
    hideLoader();
    authStarted = false;
    return;
  }

  try {
    const res = await fetch("https://telegram-auth-70lq.onrender.com/auth", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ initData })
    });

    const raw = await res.text();
    let json = null;

    try {
      json = JSON.parse(raw);
    } catch {
      setMessage(t("serverError"), t("serverErrorSub"), "error");
      hideLoader();
      authStarted = false;
      return;
    }

    if (res.status === 429) {
      setMessage("❌ " + (json?.message || t("rateLimit")), t("serverErrorSub"), "error");
      hideLoader();
      authStarted = false;
      return;
    }

    if (!json.ok) {
      setMessage("❌ " + (json.message || json.error || t("registrationFailed")), t("serverErrorSub"), "error");
      hideLoader();
      authStarted = false;
      return;
    }

    setMessage("✓ " + t("done"), t("doneSub"), "success");
    hideLoader();
    spawnConfettiExplosion();
  } catch {
    setMessage(t("serverError"), t("serverErrorSub"), "error");
    hideLoader();
    authStarted = false;
  }
}

function bindEvents(){
  const langSelectEn = document.getElementById("langSelectEn");
  const langSelectRu = document.getElementById("langSelectRu");
  const langEnBtn = document.getElementById("langEnBtn");
  const langRuBtn = document.getElementById("langRuBtn");

  if (langSelectEn) langSelectEn.addEventListener("click", () => selectLanguage("en"));
  if (langSelectRu) langSelectRu.addEventListener("click", () => selectLanguage("ru"));
  if (langEnBtn) langEnBtn.addEventListener("click", () => changeLanguage("en"));
  if (langRuBtn) langRuBtn.addEventListener("click", () => changeLanguage("ru"));
}

function init(){
  bindEvents();
  currentLang = "en";
  renderTexts();
}

if (document.readyState === "loading") {
  document.addEventListener("DOMContentLoaded", init, { once: true });
} else {
  init();
}
</script>
</body>
</html>
