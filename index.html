<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RushRetake Auth</title>

<style>
    body {
        margin: 0;
        padding: 0;
        background: #0b0b0b;
        color: #ffffff;
        font-family: "Inter", Arial, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        text-align: center;
        overflow: hidden;
        position: relative;
    }

    #msg {
        font-size: 26px;
        font-weight: 500;
        opacity: 0;
        transform: translateY(10px);
        animation: fadeIn 0.6s ease forwards;
        max-width: 90%;
        line-height: 1.4;
        z-index: 10;
    }

    @keyframes fadeIn {
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    /* Контейнер для конфетти */
    #confetti-container {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        overflow: hidden;
        z-index: 999;
    }
</style>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>

<div id="msg">⏳ Connecting your account...</div>
<div id="confetti-container"></div>

<script>
const tg = window.Telegram.WebApp;
tg.ready();

function setMessage(text) {
    document.getElementById("msg").innerText = text;
}

/* Мощный взрыв конфетти */
function spawnConfettiExplosion() {
    const container = document.getElementById("confetti-container");
    const colors = ["#ff3b3b", "#ffd93b", "#3bff62", "#3bb4ff", "#ff3bf7"];

    const particles = 60;

    for (let i = 0; i < particles; i++) {
        const div = document.createElement("div");
        div.style.position = "absolute";
        div.style.width = "8px";
        div.style.height = "8px";
        div.style.background = colors[Math.floor(Math.random() * colors.length)];
        div.style.borderRadius = "2px";
        div.style.left = "50%";
        div.style.top = "50%";
        div.style.transform = "translate(-50%, -50%)";
        div.style.willChange = "transform";

        container.appendChild(div);

        const angle = Math.random() * Math.PI * 2;
        const speed = 4 + Math.random() * 6;
        const gravity = 0.15;

        let vx = Math.cos(angle) * speed;
        let vy = Math.sin(angle) * speed;

        let x = 0;
        let y = 0;

        function animate() {
            x += vx;
            y += vy;
            vy += gravity;

            div.style.transform = `translate(${x}px, ${y}px) rotate(${y * 5}deg)`;

            if (y < window.innerHeight) {
                requestAnimationFrame(animate);
            } else {
                div.remove();
            }
        }

        requestAnimationFrame(animate);
    }
}

const data = tg.initDataUnsafe;

if (!data || !data.user) {
    setMessage("⚠️ Please open this WebApp through Telegram.");
} else {

    const payload = {
        user: {
            user: data.user,
            auth_date: data.auth_date
        }
    };

    fetch("https://telegram-auth-70lq.onrender.com/auth", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
    })
    .then(async res => {
        const raw = await res.text();
        console.log("RAW RESPONSE:", raw);

        let json;
        try {
            json = JSON.parse(raw);
        } catch (e) {
            setMessage("❌ Server error.");
            return;
        }

        if (json.ok) {
            setMessage("🎉 Done! Your login code was sent to Telegram.");
            spawnConfettiExplosion();
        } else {
            setMessage("❌ Registration failed.");
        }
    })
    .catch(err => {
        setMessage("❌ Server error.");
    });
}
</script>

</body>
</html>
